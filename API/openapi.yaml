      x-tml-pillar: "GoukassianPromise"
      x-tml-monograph-ref: "Section 2.4"
      x-tml-implementation-status: SHIPPING

  /goukassian/license/validate:
    post:
      summary: "Validate Goukassian Promise License"
      description: |
        Validates a Goukassian Promise License artifact. Returns validation
        status, expiry, and any detected violations. A failed validation
        triggers State -1 (Refuse) on the associated decision vector.

        x-tml-pillar: GoukassianPromise
        x-tml-monograph-ref: "Section 2.4"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "HSM-SignedJWT + MutualTLS"
      operationId: "goukassian.license.validate"
      tags:
        - Goukassian Promise
      security:
        - AnchoringLaneSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseValidationRequest"
      responses:
        "200":
          description: "License validation result."
          content:
            application/json:
              schema:
                type: object
                required:
                  - valid
                  - validatedAt
                properties:
                  valid:
                    type: boolean
                  validatedAt:
                    type: string
                    format: date-time
                  expiresAt:
                    type: string
                    format: date-time
                  violations:
                    type: array
                    items:
                      type: string
                    description: "List of detected violations. Empty if valid."
                unevaluatedProperties: false
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "GoukassianPromise"
      x-tml-monograph-ref: "Section 2.4"
      x-tml-implementation-status: SHIPPING
