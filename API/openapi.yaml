            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resolvedState
                - justification
                - reviewerIdentity
              properties:
                resolvedState:
                  type: integer
                  enum: [1, -1]
                  description: |
                    Terminal resolution state. +1 = PROCEED, -1 = REFUSE.
                    State 0 is not a valid resolution value.
                justification:
                  type: string
                  minLength: 50
                  description: |
                    Mandatory human reviewer justification. Minimum 50
                    characters. Appended to the TSLF-State0 record.
                reviewerIdentity:
                  type: string
                  description: "Authenticated identity of the human reviewer."
              unevaluatedProperties: false
      responses:
        "200":
          description: "Escalation resolved. Resolution logged to Moral Trace Log."
          content:
            application/json:
              schema:
                type: object
                properties:
                  escalationId:
                    type: string
                    format: uuid
                  resolvedState:
                    type: integer
                    enum: [1, -1]
                  permissionToken:
                    $ref: "#/components/schemas/PermissionToken"
                    description: "Present only when resolvedState is +1."
                unevaluatedProperties: false
        "400":
          $ref: "#/components/responses/BadRequest400"
        "404":
          $ref: "#/components/responses/NotFound404"
        "409":
          $ref: "#/components/responses/Conflict409"
      x-tml-pillar: "SacredZero,HumanRightsMandate,AlwaysMemory"
      x-tml-monograph-ref: "Section 2.2"
      x-tml-implementation-status: SHIPPING

