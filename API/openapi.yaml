                    enum: [PENDING, UNDER_REVIEW, RESOLVED]
                  outcome:
                    type: object
                    description: "Present only when status is RESOLVED."
                    properties:
                      resolvedAt:
                        type: string
                        format: date-time
                      upheld:
                        type: boolean
                        description: "True if challenge was upheld; false if original decision stands."
                      revisedStateEnvelope:
                        $ref: "#/components/schemas/StateEnvelope"
                    unevaluatedProperties: false
                unevaluatedProperties: false
        "404":
          $ref: "#/components/responses/NotFound404"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "HumanRightsMandate,MoralTraceLogs"
      x-tml-monograph-ref: "Section 2.3.3"
      x-tml-implementation-status: SHIPPING

  /redress/log-reevaluation:
    post:
      summary: "Request Moral Trace Log Re-Evaluation"
      description: |
        Initiates a formal re-evaluation of a specific Moral Trace Log entry
        under a redress or appeal proceeding. The re-evaluation does not
        modify the original immutable log; it creates a new review record
        linked to the original.

        x-tml-pillar: MoralTraceLogs, AlwaysMemory, HumanRightsMandate
        x-tml-monograph-ref: "Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "CA-VettedJWT + IPAllowlist"
      operationId: "redress.logReevaluation.request"
      tags:
        - Redress and Appeal
      security:
        - AuditorRegulatorSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - logId
                - challengeId
                - reevaluationJustification
              properties:
                logId:
                  type: string
                  format: uuid
                challengeId:
                  type: string
                  format: uuid
                reevaluationJustification:
                  type: string
                  minLength: 100
              unevaluatedProperties: false
      responses:
        "201":
          description: "Re-evaluation initiated. Original log remains immutable."
          content:
            application/json:
              schema:
                type: object
                required:
                  - reevaluationId
                  - originalLogId
                properties:
                  reevaluationId:
                    type: string
                    format: uuid
                  originalLogId:
                    type: string
                    format: uuid
                unevaluatedProperties: false
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "MoralTraceLogs,AlwaysMemory,HumanRightsMandate"
      x-tml-monograph-ref: "Section 8"
      x-tml-implementation-status: SHIPPING

  /redress/human-rights-grievances:
    post:
      summary: "File Human Rights Grievance"
      description: |
        Allows a subject or designated representative to file a formal human
        rights grievance against a TML decision, aligned with the Human Rights
        Mandate (Pillar V, UDHR/Geneva vector enforcement).

        Filed grievances are logged, assigned to the Human Rights Mandate
        compliance review queue, and anchored to the public Merkle chain.

        x-tml-pillar: HumanRightsMandate, AlwaysMemory, PublicBlockchains
        x-tml-monograph-ref: "Section 2.3.3"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "CA-VettedJWT + IPAllowlist"
      operationId: "redress.humanRightsGrievances.file"
      tags:
        - Redress and Appeal
      security:
        - AuditorRegulatorSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanRightsGrievance"
      responses:
        "201":
          description: "Human rights grievance filed and logged."
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                type: object
                required:
                  - grievanceId
                  - filedAt
                properties:
                  grievanceId:
                    type: string
                    format: uuid
                  filedAt:
                    type: string
                    format: date-time
                unevaluatedProperties: false
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "HumanRightsMandate,AlwaysMemory,PublicBlockchains"
      x-tml-monograph-ref: "Section 2.3.3"
      x-tml-implementation-status: SHIPPING

  # ==========================================================================
  # REGULATOR INSPECTION ENDPOINTS
  # Bulk evidence export. Cross-jurisdiction custodian quorum status.
  # Qualified timestamp verification.
  # ==========================================================================

  /regulator/evidence-export:
    post:
      summary: "Request Bulk Evidence Export"
      description: |
        Initiates a bulk export of Moral Trace Logs and Permission Token
        records for regulatory inspection. Exports are packaged as signed,
        Merkle-verified archives with chain-of-custody documentation.

        Exports are asynchronous; the response provides a job ID for
        status polling. Completed exports are available at the returned
        download URL for 72 hours.

        x-tml-pillar: MoralTraceLogs, PublicBlockchains, AlwaysMemory
        x-tml-monograph-ref: "Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "CA-VettedJWT + IPAllowlist"
      operationId: "regulator.evidenceExport.request"
      tags:
        - Regulator Inspection
      security:
        - AuditorRegulatorSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkEvidenceExport"
      responses:
        "202":
          description: "Evidence export job accepted. Poll exportJobId for status."
          content:
            application/json:
              schema:
                type: object
                required:
                  - exportJobId
                  - estimatedCompletionAt
                properties:
                  exportJobId:
                    type: string
                    format: uuid
                  estimatedCompletionAt:
                    type: string
                    format: date-time
                  statusUrl:
                    type: string
                    format: uri
                unevaluatedProperties: false
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
      x-tml-pillar: "MoralTraceLogs,PublicBlockchains,AlwaysMemory"
      x-tml-monograph-ref: "Section 8"
      x-tml-implementation-status: SHIPPING

  /regulator/custodian-quorum:
    get:
      summary: "Get Cross-Jurisdiction Custodian Quorum Status"
      description: |
        Returns the current quorum status of the Tri-Cameral governance
        structure across all registered jurisdictions. The HybridShield
        registry covers the Stewardship Custodians (11 members, binding veto),
        Technical Council (9 members, proposal rights only), and Smart Contract
        Treasury (automatic execution, no admin key). Reports active custodian
        count, per-custodian health, and overall quorum achievement status.

        IMPLEMENTATION NOTE: Cross-jurisdiction custodian quorum in <500ms
        is classified FUTURE (Section 10). This endpoint reports current
        quorum status; achieving sub-500ms quorum globally is blocked by
        network physics constraints across geographically distributed
        custodians. The endpoint itself is SHIPPING.

        x-tml-pillar: HybridShield
        x-tml-monograph-ref: "Section 2.3.3"
        x-tml-implementation-status: SHIPPING
        x-tml-blocking-constraint: "Section 10: Cross-jurisdiction sub-500ms quorum remains FUTURE"
        x-tml-security: "CA-VettedJWT + IPAllowlist"
      operationId: "regulator.custodianQuorum.get"
      tags:
        - Regulator Inspection
      security:
        - AuditorRegulatorSecurity: []
      responses:
        "200":
          description: "Custodian quorum status."
          content:
            application/json:
              schema:
                type: object
                required:
                  - quorumAchieved
                  - activeCustodianCount
                  - requiredQuorumThreshold
                  - custodians
                properties:
                  quorumAchieved:
                    type: boolean
                  activeCustodianCount:
                    type: integer
                    minimum: 0
                    maximum: 6
                  requiredQuorumThreshold:
                    type: integer
                    description: "Minimum custodians required for quorum."
                  custodians:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustodianHeartbeat"
                  crossJurisdictionLatencyMs:
                    type: number
                    description: |
                      Current observed cross-jurisdiction consensus latency.
                      Sub-500ms globally is classified FUTURE (Section 10).
                unevaluatedProperties: false
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
      x-tml-pillar: "HybridShield"
      x-tml-monograph-ref: "Section 2.3.3"
      x-tml-implementation-status: SHIPPING
      x-tml-blocking-constraint: "Section 10: Cross-jurisdiction sub-500ms quorum remains FUTURE"

  /regulator/timestamp-verification/{logId}:
    get:
      summary: "Verify Qualified Timestamp for Log Entry"
      description: |
        Returns the qualified timestamp verification record for a specific
        Moral Trace Log entry, demonstrating that the log was anchored
        at a cryptographically verifiable point in time.

        The timestamp is qualified per RFC 3161 (Internet X.509 PKI
        Time-Stamp Protocol) and anchored in the Merkle batch record.

        x-tml-pillar: MoralTraceLogs, PublicBlockchains
        x-tml-monograph-ref: "Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "CA-VettedJWT + IPAllowlist"
      operationId: "regulator.timestampVerification.get"
      tags:
        - Regulator Inspection
      security:
        - AuditorRegulatorSecurity: []
      parameters:
        - $ref: "#/components/parameters/LogIDParam"
      responses:
        "200":
          description: "Timestamp verification record."
          content:
            application/json:
              schema:
                type: object
                required:
                  - logId
                  - qualifiedTimestamp
                  - timestampAuthority
                  - merkleRoot
                  - verificationStatus
                properties:
                  logId:
                    type: string
                    format: uuid
                  qualifiedTimestamp:
                    type: string
                    format: date-time
                  timestampAuthority:
                    type: string
                    description: "Identity of the RFC 3161 Time-Stamp Authority."
                  merkleRoot:
                    type: string
                    pattern: "^[a-f0-9]{64}$"
                  verificationStatus:
                    type: string
                    enum: [VERIFIED, PENDING, FAILED]
                unevaluatedProperties: false
        "404":
          $ref: "#/components/responses/NotFound404"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "MoralTraceLogs,PublicBlockchains"
      x-tml-monograph-ref: "Section 8"
      x-tml-implementation-status: SHIPPING

  # ==========================================================================
  # GATEWAY ENDPOINTS
  # TML Gateway Logic routing. Lane assignment. Fail-closed status.
  # ==========================================================================

  /gateway/status:
    get:
      summary: "Get TML Gateway Status (Fail-Closed Status)"
      description: |
        Returns the current operational status of the TML Gateway, including
        lane assignment health, fail-closed status, and current routing
        configuration.

        FAIL-CLOSED: If the Gateway cannot route a request to the Anchoring
        Lane, it defaults to State 0 (SacredZero) and triggers the Sacred
        Pause. It does NOT default to State +1 (Proceed). Fail-open is not
        an acceptable degradation mode for TML.

        x-tml-pillar: SacredZero, AlwaysMemory
        x-tml-monograph-ref: "Section 2.3"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "mTLS + ServiceAccountJWT"
      operationId: "gateway.status.get"
      tags:
        - Gateway
      security:
        - InferenceLaneSecurity: []
      responses:
        "200":
          description: "Gateway status."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayRoutingStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      x-tml-pillar: "SacredZero,AlwaysMemory"
      x-tml-monograph-ref: "Section 2.3"
      x-tml-implementation-status: SHIPPING

  /gateway/lane-assignment:
    post:
      summary: "Request Lane Assignment for Decision Vector"
      description: |
        Requests lane assignment from the TML Gateway for an incoming
        decision vector. The Gateway evaluates the vector and assigns it
        to the Inference Lane (Lane 1) or escalates directly to the
        Anchoring Lane (Lane 2) based on routing logic.

        x-tml-pillar: SacredZero, AlwaysMemory, MoralTraceLogs
        x-tml-monograph-ref: "Section 2.3"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "mTLS + ServiceAccountJWT"
      operationId: "gateway.laneAssignment.request"
      tags:
        - Gateway
      security:
        - InferenceLaneSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - proposedAction
                - requestContext
              properties:
                proposedAction:
                  type: string
                  maxLength: 2048
                requestContext:
                  type: object
                  unevaluatedProperties: false
              unevaluatedProperties: false
      responses:
        "200":
          description: "Lane assignment returned."
          content:
            application/json:
              schema:
                type: object
                required:
                  - assignedLane
                  - routingRationale
                properties:
                  assignedLane:
                    type: string
                    enum: [INFERENCE_LANE, ANCHORING_LANE]
                  routingRationale:
                    type: string
                  sacredZeroOverride:
                    type: boolean
                    description: |
                      True if Gateway has overridden to SacredZero due to
                      fail-closed conditions.
                    default: false
                unevaluatedProperties: false
        "408":
          $ref: "#/components/responses/SacredZeroHold408"
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
      x-tml-pillar: "SacredZero,AlwaysMemory,MoralTraceLogs"
      x-tml-monograph-ref: "Section 2.3"
      x-tml-implementation-status: SHIPPING

  # ==========================================================================
  # GOUKASSIAN PROMISE - SIGNATURE AND LICENSE ENDPOINTS
  # Provenance. Non-repudiation. License validation.
  # ==========================================================================

  /goukassian/signature:
    get:
      summary: "Get Current Goukassian Promise Signature Block"
      description: |
        Returns the current Goukassian Promise Signature Block, which is the
        provenance and non-repudiation artifact for the TML system. The
        Signature is one of the three canonical Goukassian Promise artifacts
        alongside the Lantern and the License.

        x-tml-pillar: GoukassianPromise
        x-tml-monograph-ref: "Section 2.4"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "mTLS + ServiceAccountJWT"
      operationId: "goukassian.signature.get"
      tags:
        - Goukassian Promise
      security:
        - InferenceLaneSecurity: []
      responses:
        "200":
          description: "Current Signature Block."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureBlock"
        "503":
