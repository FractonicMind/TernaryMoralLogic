openapi: "3.1.0"

info:
  title: "Ternary Moral Logic (TML) Framework API"
  version: "3.3.0-tml-monograph-2025"
  description: |
    Canonical API specification for the Ternary Moral Logic (TML) framework.
    This specification governs the sovereign governance coprocessor operating
    in parallel with the binary inference engine.

    ARCHITECTURE OVERVIEW:
    - Inference Lane (Fast Path, Lane 1, <2ms): Binary logic proposes actions
      via State vectors (+1, 0, -1). The inference engine does NOT actuate.
    - Anchoring Lane (Governance Lane, Lane 2, <500ms): Ternary logic verifies,
      logs, and issues Permission Tokens. Actuation is gated exclusively on a
      valid Permission Token produced by this lane.
    - No Log = No Action: The iron law. A proposed State +1 from the Inference
      Lane cannot cross the actuation threshold without a cryptographically valid
      Permission Token from the Anchoring Lane.
    - Sacred Zero (State 0): An active governance state of mandatory hesitation.
      Not a null, not an error, not a timeout. When triggered, the Sacred Pause
      operational workflow executes within this state.

    TRIADIC STATE CODE (GOUKASSIAN VOW):
      "Pause when truth is uncertain"  -> State  0 (SacredZero)
      "Refuse when harm is clear"      -> State -1 (Refuse)
      "Proceed where truth is"         -> State +1 (Proceed)

    TRI-CAMERAL GOVERNANCE:
      Constitutional schema changes require TriCameralApproval. The Technical
      Council (9 members) holds proposal rights only. The Stewardship Custodians
      (11 members) hold binding veto authority - vetoExercised: true blocks
      constitutionally. The Smart Contract Treasury executes automatically with
      no admin key and no human override path. Survivability-class changes -
      any proposal modifying the NL=NA enforcement chain, the three-state model,
      the Eight Pillar definitions, chamber composition, quorum thresholds, or
      any schema const, required, or unevaluatedProperties constraint - trigger
      the Section 7A dual-vote protocol: proposer exits the chamber on
      submission, 180-day evaluation clock starts at submission regardless of
      vacancies, both votes require 75% approval from both chambers calculated
      against seated active members only, and the proposer's institution is
      banned from filling the vacated seat for one year. Forced State +1 is
      constitutionally blocked. Governance structure is identical to the TL
      framework by constitutional design.

    AUTHORITY: TML Constitutionalization Monograph v3.3.
    SPECIFICATION STATUS: This document supersedes api/complete_api_reference.md (LEGACY).

  contact:
    name: "TML Framework Governance Authority"
    url: "https://api.tml-framework.example/v1/governance"
  license:
    name: "TML Sovereign License"
    identifier: "TML-1.0"

servers:
  - url: "https://api.tml-framework.example/v1"
    description: "TML Framework API - Production Canonical Endpoint"

# ---------------------------------------------------------------------------
# SECURITY SCHEMES
# ---------------------------------------------------------------------------
components:
  securitySchemes:

    InferenceLaneSecurity:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        x-tml-security: "mTLS + ServiceAccountJWT"
        Applies to all Inference Lane endpoints (Lane 1, Fast Path).
        Mutual TLS is enforced at the transport layer. The bearer token is a
        short-lived Service Account JWT signed by the TML Gateway authority.

    AnchoringLaneSecurity:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        x-tml-security: "HSM-SignedJWT + MutualTLS"
        Applies to Anchoring Lane, Governance, and Sacred Zero escalation
        endpoints (Lane 2, Governance Lane). JWT must be signed by a
        Hardware Security Module (HSM) registered with the Tri-Cameral
        HybridShield authority. Mutual TLS is required.

    AuditorRegulatorSecurity:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        x-tml-security: "CA-VettedJWT + IPAllowlist"
        Applies to Auditor Verification, Regulator Inspection, and
        Redress/Appeal endpoints. Bearer token must be issued by a
        CA-vetted authority. IP allowlist enforcement is mandatory at the
        gateway layer.

  # -------------------------------------------------------------------------
  # SCHEMA REFERENCES (full definitions in tml_schema.json $defs)
  # -------------------------------------------------------------------------
  schemas:

    StateEnvelope:
      $ref: "tml_schema.json#/$defs/StateEnvelope"

    TSLF-State0:
      $ref: "tml_schema.json#/$defs/TSLF-State0"

    TSLF-State-1:
      $ref: "tml_schema.json#/$defs/TSLF-State-1"

    TSLF-StateP1:
      $ref: "tml_schema.json#/$defs/TSLF-StateP1"

    JustificationObject:
      $ref: "tml_schema.json#/$defs/JustificationObject"

    PermissionToken:
      $ref: "tml_schema.json#/$defs/PermissionToken"

    LanternStatus:
      $ref: "tml_schema.json#/$defs/LanternStatus"

    SignatureBlock:
      $ref: "tml_schema.json#/$defs/SignatureBlock"

    LicenseValidationRequest:
      $ref: "tml_schema.json#/$defs/LicenseValidationRequest"

    MerkleInclusionProof:
      $ref: "tml_schema.json#/$defs/MerkleInclusionProof"

    CustodianHeartbeat:
      $ref: "tml_schema.json#/$defs/CustodianHeartbeat"

    ComplianceAttestation:
      $ref: "tml_schema.json#/$defs/ComplianceAttestation"

    RedressChallenge:
      $ref: "tml_schema.json#/$defs/RedressChallenge"

    HumanRightsGrievance:
      $ref: "tml_schema.json#/$defs/HumanRightsGrievance"

    BulkEvidenceExport:
      $ref: "tml_schema.json#/$defs/BulkEvidenceExport"

    GatewayRoutingStatus:
      $ref: "tml_schema.json#/$defs/GatewayRoutingStatus"

    TriCameralApproval:
      $ref: "tml_schema.json#/$defs/TriCameralApproval"

    EmergencyOverrideRequest:
      $ref: "tml_schema.json#/$defs/EmergencyOverrideRequest"

    ProblemDetail:
      description: |
        RFC 7807 Problem Detail with TML extensions. Used for all 4xx and 5xx
        error responses across every endpoint.
      type: object
      required:
        - type
        - title
        - status
        - x-tml-state
        - x-tml-pillar
      properties:
        type:
          type: string
          format: uri
          description: "A URI reference identifying the problem type."
        title:
          type: string
          description: "Short, human-readable summary of the problem type."
        status:
          type: integer
          description: "HTTP status code."
        detail:
          type: string
          description: "Human-readable explanation specific to this occurrence."
        instance:
          type: string
          format: uri
          description: "URI reference identifying the specific occurrence."
        x-tml-state:
          type: integer
          enum: [1, 0, -1]
          description: |
            The TML triadic state active at the time of the error.
            +1 = PROCEED, 0 = SACRED_ZERO, -1 = REFUSE.
        x-tml-pillar:
          type: string
          description: "Canonical TML Pillar identifier most directly implicated."
          enum:
            - SacredZero
            - AlwaysMemory
            - GoukassianPromise
            - MoralTraceLogs
            - HumanRightsMandate
            - EarthProtectionMandate
            - HybridShield
            - PublicBlockchains
        retry_after:
          type: integer
          description: |
            Seconds before the client may retry. Required for 429 and 503
            responses. Optional for Sacred Zero escalation responses (408).
      unevaluatedProperties: false

  # -------------------------------------------------------------------------
  # HEADERS
  # -------------------------------------------------------------------------
  headers:

    IdempotencyKey:
      description: |
        Client-generated idempotency key (UUID v4 recommended). Required on all
        POST, PUT, and PATCH requests. The server guarantees that a repeated
        request with the same key within the idempotency window (24 hours)
        returns the original response without re-executing the operation.
        x-tml-idempotency: enforced
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36

    TMLRequestID:
      description: |
        Server-assigned unique identifier for this request, echoed in all
        responses. Used for distributed trace correlation across Inference and
        Anchoring lanes.
      required: false
      schema:
        type: string
        format: uuid

    TMLLaneOrigin:
      description: |
        Identifies the lane from which the request originates.
        INFERENCE_LANE = Lane 1 (Fast Path, <2ms).
        ANCHORING_LANE = Lane 2 (Governance Lane, <500ms).
      required: true
      schema:
        type: string
        enum:
          - INFERENCE_LANE
          - ANCHORING_LANE

  # -------------------------------------------------------------------------
  # PARAMETERS
  # -------------------------------------------------------------------------
  parameters:

    DecisionIDParam:
      name: decisionId
      in: path
      required: true
      description: "Unique identifier for a TML decision record."
      schema:
        type: string
        format: uuid

    LogIDParam:
      name: logId
      in: path
      required: true
      description: "Unique identifier for a Moral Trace Log entry."
      schema:
        type: string
        format: uuid

    EscalationIDParam:
      name: escalationId
      in: path
      required: true
      description: "Unique identifier for a Sacred Zero escalation case."
      schema:
        type: string
        format: uuid

    ChallengeIDParam:
      name: challengeId
      in: path
      required: true
      description: "Unique identifier for a subject-initiated redress challenge."
      schema:
        type: string
        format: uuid

    CustodianIDParam:
      name: custodianId
      in: path
      required: true
      description: |
        Unique identifier for one of the Tri-Cameral HybridShield anchoring
        nodes. Values are assigned during the distributed key ceremony.
      schema:
        type: string

    MerkleRootParam:
      name: merkleRoot
      in: path
      required: true
      description: "Hex-encoded Merkle root hash (SHA-256, 64 hex characters)."
      schema:
        type: string
        pattern: "^[a-f0-9]{64}$"

  # -------------------------------------------------------------------------
  # RESPONSES (reusable)
  # -------------------------------------------------------------------------
  responses:

    NoContent204:
      description: "Operation accepted. No response body."

    BadRequest400:
      description: "Malformed request. Schema validation failure."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    Unauthorized401:
      description: "Authentication required or token invalid."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    Forbidden403:
      description: "Authenticated principal lacks required authorization."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotFound404:
      description: "Requested resource not found."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    Conflict409:
      description: |
        Idempotency conflict: a different payload was submitted with the same
        Idempotency-Key within the active window.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    SacredZeroHold408:
      description: |
        Sacred Zero state active. The system is in mandatory hesitation.
        The Sacred Pause operational workflow is executing. Actuation is
        suspended. Human review is queued. Retry after the indicated interval
        or await the sacredPause.escalation webhook notification.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    TooManyRequests429:
      description: "Rate limit exceeded. Retry after indicated interval."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    ServiceUnavailable503:
      description: "Service temporarily unavailable. Retry after indicated interval."
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

# ---------------------------------------------------------------------------
# WEBHOOKS
# ---------------------------------------------------------------------------
webhooks:

  sacredPauseEscalation:
    post:
      summary: "Sacred Pause Escalation Notification"
      description: |
        Async notification delivered when State 0 (SacredZero) triggers the
        Sacred Pause operational workflow and queues a human-in-the-loop
        review. The TML Gateway broadcasts this to all registered escalation
        endpoints.

        RETRY SEMANTICS: Exponential backoff, minimum 3 attempts over 15
        minutes. On persistent delivery failure, the escalation is routed to
        the secondary custodian escalation queue (HybridShield failover).

        x-tml-idempotency: The notification payload includes a unique
        escalationId. Receivers MUST deduplicate on this field.

        x-tml-pillar: SacredZero
        x-tml-monograph-ref: "Section 2.2"
        x-tml-implementation-status: SHIPPING
      operationId: "webhook.sacredPauseEscalation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - escalationId
                - decisionId
                - triggeredAt
                - stateEnvelope
                - lanternStatus
              properties:
                escalationId:
                  type: string
                  format: uuid
                  description: "Unique identifier for this escalation event."
                decisionId:
                  type: string
                  format: uuid
                  description: "The decision that triggered Sacred Zero."
                triggeredAt:
                  type: string
                  format: date-time
                  description: "ISO 8601 timestamp of Sacred Zero activation."
                stateEnvelope:
                  $ref: "#/components/schemas/StateEnvelope"
                lanternStatus:
                  $ref: "#/components/schemas/LanternStatus"
                humanReviewQueueUrl:
                  type: string
                  format: uri
                  description: |
                    URL of the human review queue entry for this escalation.
              unevaluatedProperties: false
      responses:
        "200":
          description: "Escalation notification acknowledged."
        "408":
          $ref: "#/components/responses/SacredZeroHold408"

  lanternStatusBroadcast:
    post:
      summary: "Lantern Status Broadcast"
      description: |
        Public beacon signal update from the Goukassian Promise (Pillar III).
        The Lantern broadcasts the current compliance state of the TML system
        to all registered observers. This is the public transparency signal.

        RETRY SEMANTICS: Best-effort delivery, 3 attempts with 5-second
        intervals. Lantern broadcasts are idempotent by design; duplicate
        delivery is acceptable.

        x-tml-idempotency: Receivers MUST deduplicate on lanternSignalId.

        x-tml-pillar: GoukassianPromise
        x-tml-monograph-ref: "Section 2.4"
        x-tml-implementation-status: SHIPPING
      operationId: "webhook.lanternStatusBroadcast"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lanternSignalId
                - broadcastAt
                - lanternStatus
              properties:
                lanternSignalId:
                  type: string
                  format: uuid
                  description: "Unique identifier for this broadcast event."
                broadcastAt:
                  type: string
                  format: date-time
                  description: "ISO 8601 timestamp of signal emission."
                lanternStatus:
                  $ref: "#/components/schemas/LanternStatus"
                signatureBlock:
                  $ref: "#/components/schemas/SignatureBlock"
              unevaluatedProperties: false
      responses:
        "200":
          description: "Broadcast acknowledged."

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # INFERENCE LANE (Lane 1 - Fast Path, <2ms)
  # Binary logic proposes actions. Does NOT actuate.
  # ==========================================================================

  /decisions:
    post:
      summary: "Submit Decision Vector (Inference Lane)"
      description: |
        LANE: Inference Lane (Lane 1, Fast Path, <2ms)

        Submits an action proposal to the TML binary inference engine. The
        engine evaluates the proposed action against the triadic state space
        and returns a State Envelope containing the proposed state
        (+1, 0, or -1) and a Justification Object.

        CRITICAL CONSTRAINT: A proposed state of +1 (PROCEED) does NOT
        authorize actuation. The actuation layer remains locked until the
        Anchoring Lane issues a valid Permission Token via POST /anchoring-logs.
        This enforces the No Log = No Action iron law.

        State 0 (SacredZero) response triggers the Sacred Pause operational
        workflow automatically. The calling system MUST NOT retry the same
        action vector until the escalation is resolved.

        x-tml-pillar: SacredZero, AlwaysMemory
        x-tml-monograph-ref: "Section 2.3"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "mTLS + ServiceAccountJWT"
      operationId: "decisions.submit"
      tags:
        - Inference Lane
      security:
        - InferenceLaneSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: "Client idempotency key (UUID v4). x-tml-idempotency: enforced."
        - name: X-TML-Lane-Origin
          in: header
          required: true
          schema:
            type: string
            enum: [INFERENCE_LANE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - proposedAction
                - justificationObject
              properties:
                proposedAction:
                  type: string
                  description: |
                    Machine-readable descriptor of the action the binary
                    inference engine proposes to execute.
                  maxLength: 2048
                justificationObject:
                  $ref: "#/components/schemas/JustificationObject"
                requestContext:
                  type: object
                  description: |
                    Optional ambient context (session metadata, agent identity,
                    environmental signals). Does not influence state computation
                    directly; included in the Moral Trace Log.
                  unevaluatedProperties: false
              unevaluatedProperties: false
      responses:
        "200":
          description: |
            Decision vector evaluated. Returns State Envelope with proposed state.
            State +1 DOES NOT authorize actuation without a Permission Token.
          headers:
            X-TML-Request-ID:
              $ref: "#/components/headers/TMLRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateEnvelope"
        "408":
          $ref: "#/components/responses/SacredZeroHold408"
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "409":
          $ref: "#/components/responses/Conflict409"
        "429":
          $ref: "#/components/responses/TooManyRequests429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      x-tml-pillar: "SacredZero,AlwaysMemory"
      x-tml-monograph-ref: "Section 2.3"
      x-tml-implementation-status: SHIPPING

  /decisions/{decisionId}:
    get:
      summary: "Retrieve Decision Record"
      description: |
        LANE: Inference Lane (Lane 1)

        Retrieves a previously submitted decision record and its current State
        Envelope, including any Permission Token issued by the Anchoring Lane.

        x-tml-pillar: AlwaysMemory, MoralTraceLogs
        x-tml-monograph-ref: "Section 2.3, Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "mTLS + ServiceAccountJWT"
      operationId: "decisions.get"
      tags:
        - Inference Lane
      security:
        - InferenceLaneSecurity: []
      parameters:
        - $ref: "#/components/parameters/DecisionIDParam"
      responses:
        "200":
          description: "Decision record found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateEnvelope"
        "404":
          $ref: "#/components/responses/NotFound404"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
      x-tml-pillar: "AlwaysMemory,MoralTraceLogs"
      x-tml-monograph-ref: "Section 2.3, Section 8"
      x-tml-implementation-status: SHIPPING

  # ==========================================================================
  # ANCHORING LANE (Lane 2 - Governance Lane, <500ms)
  # Ternary logic verifies, logs, and issues Permission Tokens.
  # Actuation is gated exclusively on a valid Permission Token.
  # ==========================================================================

  /anchoring-logs:
    post:
      summary: "Submit Moral Trace Log and Request Permission Token (Anchoring Lane)"
      description: |
        LANE: Anchoring Lane (Lane 2, Governance Lane, <500ms)

        Submits a complete Moral Trace Log (TSLF) to the Anchoring Lane for
        cryptographic verification and Merkle-batched anchoring. On successful
        anchoring, returns a Permission Token.

        NO LOG = NO ACTION: The Permission Token returned by this endpoint is
        the sole authorization for the actuation layer to execute a proposed
        +1 state action. The inference engine CANNOT transition to execution
        without this token. Token absence renders the State Envelope invalid.

        ANTI-SPOLIATION (Pillar II - AlwaysMemory): Log submission is a
        pre-actuation commit. The log is immutably anchored before any
        Permission Token is issued. If anchoring fails, no token is issued
        and no action executes.

        State 0 (SacredZero) logs do NOT produce a Permission Token. They
        produce an escalation record and trigger the sacredPauseEscalation
        webhook.

        State -1 (Refuse) logs do NOT produce a Permission Token. They
        produce a refusal record.

        x-tml-pillar: AlwaysMemory, PublicBlockchains, MoralTraceLogs
        x-tml-monograph-ref: "Section 2.3.3, Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "HSM-SignedJWT + MutualTLS"
      operationId: "anchoringLogs.submit"
      tags:
        - Anchoring Lane
      security:
        - AnchoringLaneSecurity: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: "Client idempotency key (UUID v4). x-tml-idempotency: enforced."
        - name: X-TML-Lane-Origin
          in: header
          required: true
          schema:
            type: string
            enum: [ANCHORING_LANE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: |
                TSLF Moral Trace Log. Must be the state-appropriate variant:
                TSLF-State0 for Sacred Zero, TSLF-State-1 for Refusal,
                TSLF-StateP1 for Proceed. The discriminator field is
                `currentState`.
              oneOf:
                - $ref: "#/components/schemas/TSLF-State0"
                - $ref: "#/components/schemas/TSLF-State-1"
                - $ref: "#/components/schemas/TSLF-StateP1"
              discriminator:
                propertyName: currentState
                mapping:
                  "0":  "tml_schema.json#/$defs/TSLF-State0"
                  "-1": "tml_schema.json#/$defs/TSLF-State-1"
                  "+1": "tml_schema.json#/$defs/TSLF-StateP1"
      responses:
        "201":
          description: |
            Moral Trace Log anchored. For State +1 only: Permission Token
            returned. For State 0: escalation record created; await
            sacredPauseEscalation webhook. For State -1: refusal record
            created.
          headers:
            X-TML-Request-ID:
              $ref: "#/components/headers/TMLRequestID"
            Location:
              schema:
                type: string
                format: uri
              description: "URI of the created anchoring log record."
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissionToken:
                    $ref: "#/components/schemas/PermissionToken"
                    description: |
                      Present ONLY when currentState is +1. Absent for
                      State 0 and State -1 responses.
                  logId:
                    type: string
                    format: uuid
                  anchoring:
                    type: object
                    properties:
                      merkleRoot:
                        type: string
                        pattern: "^[a-f0-9]{64}$"
                      batchId:
                        type: string
                      estimatedFinalizationAt:
                        type: string
                        format: date-time
                        description: |
                          Estimated time for Merkle batch finalization on
                          public blockchain. Note: real-time per-token
                          anchoring at global AI scale is classified FUTURE
                          per Section 10. Batch anchoring is SHIPPING.
                    unevaluatedProperties: false
                unevaluatedProperties: false
        "408":
          $ref: "#/components/responses/SacredZeroHold408"
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "409":
          $ref: "#/components/responses/Conflict409"
        "503":
          $ref: "#/components/responses/ServiceUnavailable503"
      x-tml-pillar: "AlwaysMemory,PublicBlockchains,MoralTraceLogs"
      x-tml-monograph-ref: "Section 2.3.3, Section 8"
      x-tml-implementation-status: SHIPPING

  /anchoring-logs/{logId}:
    get:
      summary: "Retrieve Anchoring Log Record"
      description: |
        LANE: Anchoring Lane (Lane 2)

        Retrieves an anchored Moral Trace Log by its unique identifier,
        including current Merkle anchoring status and any issued Permission Token.

        x-tml-pillar: MoralTraceLogs, PublicBlockchains
        x-tml-monograph-ref: "Section 8"
        x-tml-implementation-status: SHIPPING
        x-tml-security: "HSM-SignedJWT + MutualTLS"
      operationId: "anchoringLogs.get"
      tags:
        - Anchoring Lane
      security:
        - AnchoringLaneSecurity: []
      parameters:
        - $ref: "#/components/parameters/LogIDParam"
      responses:
        "200":
          description: "Anchoring log record found."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TSLF-State0"
                  - $ref: "#/components/schemas/TSLF-State-1"
                  - $ref: "#/components/schemas/TSLF-StateP1"
        "404":
          $ref: "#/components/responses/NotFound404"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
      x-tml-pillar: "MoralTraceLogs,PublicBlockchains"
      x-tml-monograph-ref: "Section 8"
      x-tml-implementation-status: SHIPPING

  # ==========================================================================
  # SACRED ZERO ESCALATION
  # Human-in-the-loop review queue. Lantern signal management.
  # ==========================================================================

  /sacred-zero/escalations:
    get:
      summary: "List Sacred Zero Escalation Queue"
      description: |
        LANE: Anchoring Lane (Lane 2, Governance Lane)

