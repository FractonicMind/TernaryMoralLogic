    patch:
      summary: "Resolve Sacred Zero Escalation (Human Review Decision)"
      description: |
        Submits a human authority resolution for an active Sacred Zero
        escalation. The resolution must specify a terminal state (+1 or -1).
        State 0 is not a valid resolution state; the human reviewer must
        make a determination.

        On resolution to +1: the Anchoring Lane issues a Permission Token
        and the decision proceeds through the standard actuation gate.
        On resolution to -1: a Refusal Log is generated and the action
        is permanently blocked.

