        Activates emergency override protocols. This endpoint supports:
        1. Break-glass shutdown: Halts all active Inference Lane proposals
           and suspends Permission Token issuance system-wide.
        2. Kill switch activation: Forces all active State Envelopes to
           State -1 (REFUSE) immediately.
        3. Forced state transition: Under supreme authority, transitions a
           specific decision to a designated state with mandatory logging.

        ALL INVOCATIONS are immutably logged to the Moral Trace Log before
        taking effect. No Log = No Action applies without exception, including
        to emergency overrides.

        Survivability-class overrides - those targeting the NL=NA enforcement
        chain, Sacred Zero state model, Eight Pillar definitions, or chamber
        composition - require TriCameralApproval with Section 7A dual-vote
        protocol. The Stewardship Custodians hold binding veto. Forced State
        +1 is constitutionally blocked and will revert UnauthorizedOverride.

        This endpoint requires the highest security classification and MUST
        be invoked by an authenticated supreme authority identity.

        x-tml-pillar: SacredZero, AlwaysMemory, HybridShield
        x-tml-monograph-ref: "Section 13.3"
        x-tml-implementation-status: SHIPPING
