### 20.1 sacredPause.escalation

#### 20.1.1 Trigger: Async Notification on State 0 Human Review

The **`sacredPause.escalation` webhook fires asynchronously when a decision enters Sacred Zero state and requires human review**, delivering an `EscalationNotification` payload to pre-registered subscribers. This webhook implements the **operational workflow of Sacred Pause**, ensuring that human reviewers are notified through their preferred channels without polling the API. The trigger condition is the **transition of any decision to `current_state: 0` (Sacred Zero)** where the escalation protocol is activated. The webhook includes **`x-tml-idempotency` headers** to prevent duplicate processing of escalation notifications by recipients, with **retry semantics specifying exponential backoff** (initial delay 1 second, maximum delay 60 seconds, maximum 10 retry attempts) for failed deliveries.

#### 20.1.2 Payload: EscalationNotification Schema

The webhook payload conforms to the **`EscalationNotification` schema**, containing: `escalation_id` (UUID), `decision_id` (UUID), `status` (enum: ESCALATED/UNDER_REVIEW/RESOLVED), and optional `resolution` (string). The payload includes **sufficient information for subscribers to correlate notifications with their decision tracking systems** and route them to appropriate reviewers. The `ESCALATED` status value is **unique to the webhook context**, indicating the initial notification that a Sacred Zero state has triggered automatic escalation.

### 20.2 lanternStatus.broadcast

#### 20.2.1 Trigger: Public Beacon Signal Update

The **`lanternStatus.broadcast` webhook fires asynchronously when the public compliance beacon signal changes**, delivering a `LanternStatus` payload to all registered subscribers. This webhook implements the **Goukassian Promise's transparency requirement** by making system moral status visible to external observers in real-time. The trigger condition is **any change in the Lantern status value** (GREEN to YELLOW, YELLOW to RED, etc.) or **periodic heartbeat broadcasts** at configurable intervals (default: 60 seconds) even when status is unchanged. The webhook includes **`x-tml-idempotency` headers** and **retry semantics with exponential backoff** (initial delay 2 seconds, maximum delay 120 seconds, maximum 5 retry attempts) for failed deliveries.

#### 20.2.2 Payload: LanternStatus Schema

The webhook payload conforms to the **`LanternStatus` schema**, containing: `status` (enum: GREEN/YELLOW/RED), `timestamp` (date-time), and optional `custodian_id` (string). The payload provides **immediate visibility into system compliance posture** for external monitoring systems, public dashboards, and regulatory oversight interfaces. The inclusion of `custodian_id` enables **multi-custodian deployments** where each of the six Hybrid Shield custodians may report independent status values, allowing observers to **detect geographic or jurisdictional variations in governance health**.

## 21. Cross-Cutting Requirements

### 21.1 Idempotency-Key Header for POST/PUT/PATCH Endpoints

Every **POST, PUT, and PATCH endpoint** in the TML API specification **requires an `Idempotency-Key` header** to prevent duplicate processing of retry requests. This header carries a **client-generated UUID** that the server uses to recognize and deduplicate repeated submissions. The idempotency key is **retained by the server for a minimum of 24 hours** (configurable per deployment), after which duplicate keys are treated as new requests. The specification requires that **responses to duplicate requests return the original response status and body** without re-executing the underlying operation, ensuring that network retries or client bugs do not result in unintended side effects. The `Idempotency-Key` header is **omitted from GET and DELETE endpoints** where operations are inherently idempotent or where the specification defines explicit idempotency semantics.

### 21.2 RFC 7807 Problem+JSON Error Responses

All error responses in the TML API specification **conform to RFC 7807** (`application/problem+json`), providing a **standardized error format** that includes: `type` (URI identifying the error type), `title` (human-readable error summary), `status` (HTTP status code), `detail` (human-readable explanation), and `instance` (URI identifying the specific error occurrence). This format replaces legacy error response patterns with a **machine-readable, extensible structure** that supports automated error handling and monitoring.

#### 21.2.1 Custom x-tml-state Field

The error response schema includes a **custom `x-tml-state` field** that carries the **triadic state value associated with the error**. This field enables error handlers to **understand the governance context of failures**: for example, a validation error on a StateEnvelope might include `"x-tml-state": 0` to indicate that the error occurred during Sacred Zero processing. The `x-tml-state` field is **optional in error responses** where no state context applies (such as authentication failures or server errors).

#### 21.2.2 Custom x-tml-pillar Field

The error response schema includes a **custom `x-tml-pillar` field** that identifies the **TML Pillar associated with the error**. This field uses the **canonical pillar identifiers** (SacredZero, AlwaysMemory, GoukassianPromise, MoralTraceLogs, HumanRightsMandate, EarthProtectionMandate, HybridShield, PublicBlockchains) to **enable pillar-specific error routing and alerting**. For example, a Merkle root verification failure would include `"x-tml-pillar": "PublicBlockchains"`, directing operational response to the appropriate governance domain.

#### 21.2.3 retry_after Field

The error response schema includes a **`retry_after` field** (integer, seconds) that indicates **how long the client should wait before retrying the failed request**. This field is **included in 429 (Too Many Requests) and 503 (Service Unavailable) responses**, and may be included in other error responses where transient conditions are expected to resolve. The `retry_after` field implements **client-side backoff guidance** that reduces server load during recovery and prevents thundering herd scenarios.

