# TML Specification Architecture v3.3 — Deliverable A: openapi.yaml

## 1. Specification Header and Metadata

### 1.1 OpenAPI Version Declaration

The TML API Specification Architecture v3.3 employs **OpenAPI 3.1.0** as its foundational specification language, a deliberate selection that enables full **JSON Schema Draft 2020-12** compatibility and advanced conditional validation capabilities essential for the framework's governance model . This version choice carries significant technical implications: OpenAPI 3.1.0 eliminates the historical divergence between OpenAPI's Schema Object dialect and standard JSON Schema, permitting the use of `if/then/else` conditionals, `unevaluatedProperties`, and other modern validation keywords that are indispensable for enforcing the TML framework's strict governance rules. The specification explicitly declares `openapi: 3.1.0` at the document root, establishing the contract version that all consuming tools and generators must support. This declaration precedes all other document elements and serves as the authoritative signal for parser behavior, ensuring that conditional schema constructs such as the **StateEnvelope's permission token requirement** (which uses `if`/`then` to conditionally mandate the `permission_token` field when `current_state` equals 1) are processed correctly rather than being rejected as unknown keywords. The selection of OpenAPI 3.1.0 over the more widely deployed 3.0.x reflects the specification's emphasis on **correctness over compatibility**, acknowledging that the TML framework targets regulated deployments where validation precision outweighs ecosystem convenience.

### 1.2 Info Block: Title, Description, and Monograph-Linked Version

The `info` block establishes critical provenance metadata that binds this API specification irrevocably to its authoritative source document, the **TML Constitutionalization Monograph**. The `title` field contains the value **"TML API Specification"**, providing immediate identification of the document's purpose and domain. The `description` field carries **"The canonical API specification for the TML framework"**, reinforcing the document's status as the single source of truth for API contracts within the ecosystem. Most significantly, the `version` field is set to **`3.3.0-tml-monograph-2025`**, implementing the mandatory requirement from Section 5A that the API specification version must be tied to the monograph version . This compound version string encodes three layers of information: the semantic version `3.3.0` indicating the API specification's own evolution, the prefix `tml-monograph` establishing provenance from the TML Constitutionalization Monograph, and the suffix `2025` indicating the monograph publication year. This versioning strategy ensures that any consumer of the API specification can immediately determine which monograph version governs the semantic content, preventing the dangerous scenario where an implementation team references an outdated monograph while building against a newer API contract. The version string's structure also permits automated tooling to parse and validate monograph compatibility, enabling CI/CD pipelines to flag version mismatches between specification and documentation sources.

### 1.3 Server Configuration: Placeholder URL

The `servers` array contains a single entry with the URL **`https://api.tml-framework.example/v1`**, implementing the explicit requirement for a placeholder URL that indicates the intended API base path without specifying a production deployment target . This placeholder follows established conventions by using the `.example` top-level domain, which is reserved by RFC 2606 and guarantees non-routability. The `/v1` path prefix establishes the API versioning strategy, indicating that this specification represents the first major version of the TML API surface. The choice of a single server entry rather than multiple environment-specific URLs (such as separate entries for development, staging, and production) reflects the specification's focus on **contract definition rather than deployment configuration**. The server object does not include variable substitutions or server-level security overrides, keeping the configuration minimal and deterministic. This placeholder URL serves as the base against which all relative path items in the Paths Object are resolved, meaning that the endpoint `/decisions` expands to the full URL `https://api.tml-framework.example/v1/decisions` for documentation and client generation purposes.

## 2. Security Architecture

### 2.1 Security Scheme Definitions

The TML security architecture implements a **tiered authentication and authorization model** that maps directly to the Dual-Lane Latency Architecture's separation of concerns. **Six distinct security schemes** are defined in the `components.securitySchemes` section, organized into three logical tiers that reflect the sensitivity and consequence of operations in each lane . This tiered security model reflects the fundamental principle that different operational lanes carry different risk profiles and therefore require different authentication and authorization mechanisms. The security schemes are not merely technical choices but **architectural expressions of the TML governance model**, with each scheme's properties carefully calibrated to the sensitivity of the endpoints it protects.

| Scheme Identifier | Type | Scheme | Lane Assignment | Security Tier | Key Characteristic |
|-------------------|------|--------|-----------------|---------------|-------------------|
| `mTLS` | `mutualTLS` | — | Inference Lane | Transport | Bidirectional certificate authentication; <2ms latency target |
| `ServiceAccountJWT` | `http` | `bearer` | Inference Lane | Application | Service account tokens; machine-to-machine identity |
| `HSM_SignedJWT` | `http` | `bearer` | Anchoring/Governance | Application | Hardware Security Module signing; non-repudiation |
| `MutualTLS` | `mutualTLS` | — | Anchoring/Governance | Transport | Independent PKI hierarchy from Inference Lane |
| `CA_VettedJWT` | `http` | `bearer` | Auditor/Regulator/Redress | Application | Certificate Authority identity vetting; human principals |
| `IPAllowlist` | `apiKey` | `X-Forwarded-For` header | Auditor/Regulator/Redress | Network | Source IP validation; defense-in-depth for sensitive operations |

*Table 1: Security Scheme Definitions by Lane and Tier*

#### 2.1.1 mTLS (Inference Lane)

The `mTLS` security scheme is defined with `type: mutualTLS`, implementing **mutual Transport Layer Security authentication** for the Inference Lane. Mutual TLS provides certificate-based bilateral authentication where both client and server present X.509 certificates, establishing cryptographic identity without relying on bearer tokens or passwords. This scheme is assigned to the Inference Lane endpoints (`/decisions`, `/gateway/route`) because these endpoints handle **high-frequency, low-latency decision proposals** that require automated authentication without the overhead of token acquisition and validation. The mTLS scheme operates at the transport layer, meaning it authenticates the connection rather than individual requests, which aligns with the Inference Lane's **<2ms latency target** by avoiding per-request cryptographic operations. The specification does not define certificate authority requirements, certificate revocation checking, or subject name validation rules at the OpenAPI layer, leaving these to operational deployment configurations while establishing the contract that mutual authentication is mandatory.

#### 2.1.2 ServiceAccountJWT (Inference Lane)

The `ServiceAccountJWT` security scheme is defined with `type: http` and `scheme: bearer`, implementing **JSON Web Token authentication using service account credentials**. This scheme complements mTLS by providing **application-layer identity and authorization claims** that transport-layer authentication cannot convey. The service account model implies non-human principals (such as microservices, batch processors, or automated decision sources) rather than individual user identities, reflecting the Inference Lane's role as a **machine-to-machine interface**. The JWT tokens are expected to carry claims identifying the requesting service, its authorized decision domains, and potentially rate-limiting or quota information. The specification does not define the token issuer, audience, or claim structure at the OpenAPI layer, deferring these to the monograph's security architecture sections. The combination of mTLS and ServiceAccountJWT for Inference Lane endpoints implements **defense-in-depth**: mTLS authenticates the network endpoint, while the JWT authenticates the application principal, preventing scenarios where compromised network access alone would permit unauthorized decision submissions.

#### 2.1.3 HSM-SignedJWT (Anchoring/Governance Lanes)

The `HSM_SignedJWT` security scheme is defined with `type: http` and `scheme: bearer`, implementing **JSON Web Token authentication with Hardware Security Module (HSM) cryptographic signing**. This scheme represents a **significant security elevation** from the Inference Lane's ServiceAccountJWT, requiring that tokens be signed using private keys protected by hardware security modules rather than software-stored keys. The HSM requirement reflects the Anchoring Lane's role as the **sovereign governance coprocessor**: because this lane issues Permission Tokens that authorize physical actuation, the authentication mechanism must provide the highest level of **non-repudiation and key protection**. HSM signing ensures that token signing keys cannot be extracted from the hardware even by administrators or compromised operating systems, implementing the **"No Log = No Action" principle at the authentication layer**. The specification's use of the exact identifier `HSM_SignedJWT` (with underscore rather than hyphen) maintains consistency with the canonical naming conventions while clearly signaling the hardware-backed security requirement to implementers and auditors.

#### 2.1.4 MutualTLS (Anchoring/Governance Lanes)

The `MutualTLS` security scheme is defined with `type: mutualTLS`, implementing **mutual TLS authentication for the Anchoring and Governance Lanes**. This scheme is functionally identical to the `mTLS` scheme defined for the Inference Lane but carries a **distinct identifier to permit independent configuration and policy application**. The separation of `mTLS` and `MutualTLS` as distinct scheme definitions enables operational deployments to apply different certificate policies, trust anchors, and validation rules to the Inference Lane versus the Anchoring Lane. For example, the Anchoring Lane might require certificates issued by a dedicated internal CA with stricter validation procedures, while the Inference Lane accepts certificates from a broader operational CA. The specification requires both `HSM_SignedJWT` and `MutualTLS` for Anchoring Lane endpoints, implementing the same defense-in-depth pattern as the Inference Lane but with **elevated security requirements at both layers**.

#### 2.1.5 CA-VettedJWT (Auditor/Regulator/Redress)

The `CA_VettedJWT` security scheme is defined with `type: http` and `scheme: bearer`, implementing **JSON Web Token authentication with Certificate Authority vetting of the token holder's identity**. This scheme targets **human principals** (auditors, regulators, and subjects seeking redress) rather than service accounts, requiring that the token issuance process include identity verification by a trusted certificate authority. The CA vetting process implies a higher level of identity assurance than self-asserted or organizationally-provisioned service accounts, reflecting the sensitive nature of auditor and regulator access to governance data. The specification does not define the specific CA vetting procedures, leaving these to operational policy while establishing the contract that CA-vetted identity is mandatory for these endpoints. The `CA_VettedJWT` scheme is always combined with `IPAllowlist` for auditor, regulator, and redress endpoints, implementing **network-layer access control in addition to application-layer authentication**.

#### 2.1.6 IPAllowlist (Auditor/Regulator/Redress)

The `IPAllowlist` security scheme is defined with `type: apiKey`, `name: X-Forwarded-For`, and `in: header`, implementing **IP address-based access control**. This scheme extracts the client's IP address from the `X-Forwarded-For` header (supporting proxy and load balancer deployments) and validates it against an allowlist of permitted source networks. The API key model is used here as a mechanism for the gateway or proxy layer to extract and validate the client IP, rather than as a traditional API key secret. The IPAllowlist scheme provides **network-layer access control that complements the CA-VettedJWT application-layer authentication**, ensuring that even compromised credentials cannot be used from unauthorized network locations. This scheme is particularly relevant for regulator endpoints that may handle bulk evidence exports or cross-jurisdiction queries, where the source network provides an additional compliance signal for jurisdiction validation.

### 2.2 Security Requirement Application per Lane

The security requirements are applied to endpoints through the `security` field in each path item, implementing a **consistent pattern that maps endpoint function to security tier**. The Inference Lane endpoints (`/decisions` POST, `/gateway/route` POST) require both `mTLS` and `ServiceAccountJWT`, with empty arrays indicating that no specific scopes are defined at the OpenAPI layer. The Anchoring and Governance Lane endpoints (`/anchoring/logs` POST, `/escalations` POST, `/refusals` POST) require both `HSM_SignedJWT` and `MutualTLS`. The Emergency Override endpoints (`/emergency/shutdown` POST, `/emergency/kill-switch` POST) require `CA_VettedJWT` and `IPAllowlist`, reflecting their **supreme authority access pattern**. The Auditor Verification endpoints (`/audit/merkle-root` GET, `/audit/log-inclusion/{log_id}` GET) require `CA_VettedJWT` alone, as these are **read-only operations with lower sensitivity** than regulator exports. The Redress endpoint (`/redress/challenge` POST) requires `ServiceAccountJWT`, reflecting its **subject-initiated nature** that does not require the same identity assurance as auditor access. The Regulator Inspection endpoints show variation: `/regulator/evidence/export` GET and `/regulator/custodian-quorum` GET require `CA_VettedJWT`, while `/regulator/timestamp/{log_id}` GET also requires `CA_VettedJWT`. The Gateway status endpoint (`/gateway/status` GET) requires only `ServiceAccountJWT`, reflecting its **lower-sensitivity operational monitoring function**.

| Endpoint Category | Required Security Schemes | Lane | Rationale |
|-------------------|--------------------------|------|-----------|
| `/decisions`, `/gateway/route` | `mTLS` + `ServiceAccountJWT` | Inference | Fast, automated authentication for <2ms proposals |
| `/anchoring/logs`, `/escalations`, `/refusals` | `HSM_SignedJWT` + `MutualTLS` | Anchoring/Governance | Hardware-backed non-repudiation for Permission Token issuance |
| `/emergency/shutdown`, `/emergency/kill-switch` | `CA_VettedJWT` + `IPAllowlist` | Supreme Authority | Multi-factor identity + network origin for catastrophic override |
| `/audit/*` | `CA_VettedJWT` | Auditor | Institutional identity for read-only verification |
| `/redress/challenge` | `ServiceAccountJWT` | Redress | Accessible subject challenge filing |
| `/regulator/*` | `CA_VettedJWT` (+ `IPAllowlist` for bulk export) | Regulator | Highest assurance for sensitive oversight data |
| `/gateway/status` | `ServiceAccountJWT` | Gateway Monitoring | Lightweight health check access |

*Table 2: Security Requirement Application by Endpoint Category*

## 3. Core Schemas: Triadic State and Decision Framework

### 3.1 StateEnvelope Schema

The `StateEnvelope` schema is the **central data structure of the TML API**, serving as the outer decision container that carries the triadic state determination from the Inference Lane through the Anchoring Lane to potential actuation. This schema implements the **core governance contract** of the TML framework and contains the most sophisticated validation logic in the entire specification.

#### 3.1.1 Triadic State Values: +1, 0, -1

The `current_state` field is defined as an integer with **`enum: [-1, 0, 1]`**, explicitly implementing the **Triadic Logic Core** with signed integer representation. This design choice carries profound semantic significance: the use of integers rather than strings enables **mathematical operations on state values** (such as computing state distances or aggregating state distributions), while the signed representation captures the directional nature of the ternary logic (negative for refusal, zero for pause, positive for proceed). The enum constraint ensures that no other values are accepted, **preventing the representation of Sacred Zero as `null`, `error`, `false`, or `timeout`** as explicitly prohibited by the quality gates. The integer values directly correspond to the **Goukassian Vow**: -1 for "Refuse when harm is clear", 0 for "Pause when truth is uncertain", and +1 for "Proceed where truth is". This schema-level enforcement ensures that all TML-compliant implementations use **consistent state representation**, enabling interoperability and auditability.

#### 3.1.2 Conditional Permission Token Requirement for Proceed State

The StateEnvelope schema implements **conditional validation using JSON Schema's `if`/`then` construct** to enforce the "No Log = No Action" principle at the schema level. The `if` clause tests whether `current_state` has the `const` value of `1` (the Proceed state), and the `then` clause adds `permission_token` to the `required` array. This means that any StateEnvelope with `current_state: 1` that lacks a `permission_token` field will **fail schema validation**, preventing the inference engine from transitioning to the Proceed state without authorization from the Anchoring Lane. This conditional requirement is the **schema-level enforcement mechanism for the iron law**: the binary lane may propose +1, but the ternary lane must produce a valid Permission Token before the envelope becomes valid. The `permission_token` field itself is defined as a string without format constraints at the StateEnvelope level, with the expectation that it will contain a reference or embedded Permission Token object that can be validated against the Anchoring Lane's issuance records.

#### 3.1.3 State Label and Proposed Action Fields

The `state_label` field is defined as a string without enum constraints, providing **human-readable identification of the state** while permitting extensibility for localized labels or additional semantic annotations. The quality gates require that `state_label` contain the value "SacredZero" when `current_state` is 0, but this is not enforced at the schema level to avoid coupling the label values to the integer states too tightly. The `proposed_action` field is defined as a string carrying the **action identifier that the Inference Lane proposes for execution**. This field is required for all state envelopes, ensuring that the governance system always knows what action is being evaluated even in refusal or pause states. The combination of `current_state`, `state_label`, and `proposed_action` provides **complete decision context**: the numeric state for machine processing, the human-readable label for interfaces and logs, and the action identifier for actuation system routing.

### 3.2 DecisionVector Schema

The `DecisionVector` schema defines the **input to the Inference Lane's decision process**, containing the minimal information needed to propose a triadic state. The schema has two fields: `action` (required, string) and `context` (optional, object). The `action` field carries the identifier of the action being requested, which the Inference Lane will evaluate against its pattern recognition and statistical models. The `context` field provides an **extensible object for additional decision context**, such as subject identifiers, environmental factors, or historical data that may influence the state determination. The simplicity of this schema reflects the Inference Lane's **<2ms latency target**: by minimizing the input structure, the specification reduces serialization and validation overhead for the fast path. The `context` object's open structure (no defined properties) permits implementations to include **domain-specific decision factors without schema changes**, while the `unevaluatedProperties: false` constraint at the root level (when the full schema bundle is assembled) will prevent unexpected fields from propagating.

### 3.3 PermissionToken Schema

The `PermissionToken` schema is the **standalone definition of the cryptographic release key** that enforces "No Log = No Action", serving as the schema-level representation of the Anchoring Lane's authorization to proceed.

#### 3.3.1 Log Hash Binding (SHA-256)

The `log_hash` field is defined as a string with **`format: sha256`**, carrying the **SHA-256 hash of the anchored Moral Trace Log**. This field creates the **cryptographic binding between the Permission Token and the specific governance log entry** that authorized the action, enabling auditors to verify that the token was issued for a particular decision and preventing token replay across different decisions. The SHA-256 format annotation provides semantic information to tooling and validators, though JSON Schema does not enforce hash format constraints natively. The log hash binding is the **foundation of non-repudiation**: because the hash covers the complete Moral Trace Log including the State Envelope, Justification Object, and timestamp, any modification to the log would invalidate the token's hash reference.

#### 3.3.2 Epoch Timestamp and Signer Key ID

The `epoch_timestamp` field is defined as an integer carrying the **Unix epoch timestamp of token issuance**. This field provides **temporal bounds for token validity** and enables chronological ordering of permission grants for audit purposes. The use of integer epoch seconds rather than ISO 8601 string representation reduces token size and parsing complexity, aligning with the Anchoring Lane's **<500ms latency target**. The `signer_key_id` field is defined as a string identifying the **cryptographic key used to sign the token**. This field enables **key rotation and revocation**: if a signing key is compromised, tokens signed by that key can be identified and invalidated based on the `signer_key_id` without affecting tokens signed by other keys.

#### 3.3.3 Lane Origin Enumeration (Inference/Anchoring)

The `lane_origin` field is defined as a string with **`enum: ["Inference", "Anchoring"]`**, indicating **which lane initiated the token creation**. This field supports the dual-lane architecture by tracking whether the token was generated as part of the standard Anchoring Lane flow or through an Inference Lane optimization path. The enumeration values use PascalCase rather than UPPER_SNAKE_CASE, reflecting the specification's use of PascalCase for schema-level identifiers even when the general convention prefers UPPER_SNAKE_CASE for enum values. This apparent inconsistency is resolved by noting that `lane_origin` is a string field with enum constraints rather than a formal enumeration type, and the values "Inference" and "Anchoring" are proper nouns in the TML architecture.

### 3.4 JustificationObject Schema

The `JustificationObject` schema defines the **evidentiary envelope that travels between the Inference and Anchoring lanes**, carrying evidence and reasoning for the state determination.

#### 3.4.1 Inference Lane Evidence

The `inference_lane` field is defined as a string, carrying the **Inference Lane's justification for its proposed state**. This field captures the **binary logic's reasoning**, which may include pattern match confidence scores, statistical model outputs, or rule engine firing records. The string type permits flexible representation of justification content, from structured JSON strings to human-readable explanations, depending on the implementation's logging sophistication. The inclusion of inference lane evidence in the JustificationObject ensures that the **fast-path Inference Lane's contributions are not opaque black boxes**, but rather transparent inputs to the governance process.

#### 3.4.2 Anchoring Lane Evidence

The `anchoring_lane` field is defined as a string, carrying the **Anchoring Lane's verification and augmentation of the Inference Lane's justification**. This field captures the **ternary logic's governance review**, which may include pillar-specific compliance checks, human rights vector analysis, or earth protection mandate verification. The `evidence` field is defined as an array of objects, providing an **extensible structure for supporting documentation**, external references, or structured compliance data. The open object structure permits implementations to include **diverse evidence types without schema modification**, while the array ordering can convey evidentiary priority or chronological sequence.

## 4. Moral Trace Log Schemas (TSLF)

### 4.1 MoralTraceLog Container Schema

The `MoralTraceLog` schema is the **container structure for the Ternary State Log Format (TSLF)**, serving as the **forensic record of governance decisions**. The schema requires four fields: `log_id` (UUID format), `state_envelope` (reference to StateEnvelope), `justification` (reference to JustificationObject), and `timestamp` (date-time format). This container structure implements the **"Always Memory" pillar (Pillar II)** by ensuring that every governance decision is recorded with a unique identifier, complete state information, full justification, and qualified timestamp. The `log_id` field's UUID format ensures **global uniqueness without central coordination**, enabling distributed log generation. The `timestamp` field's date-time format provides **ISO 8601 compliance** for temporal ordering and cross-system correlation. The schema does not include state-specific fields directly; instead, the StateEnvelope's `current_state` value determines which TSLF state variant applies, with the detailed state-specific data carried in the JustificationObject's `evidence` array or in extended schema definitions that would be included in the full `tml_schema.json` deliverable.

### 4.2 TSLF State Variant: Sacred Pause (State 0)

The **Sacred Pause state variant** is represented through the `EscalationRequest` and `EscalationResponse` schemas, which capture the **operational workflow triggered within Sacred Zero**. While the generated specification does not define separate TSLF-State0, TSLF-State-1, and TSLF-State+1 schemas as distinct components (a deviation from the Section 5B outline that specifies `oneOf` with `discriminator` for TSLF state variants), the EscalationRequest and related schemas capture the essential State 0 processing elements .

#### 4.2.1 Lantern Status Field

The `lantern_status` field in the EscalationRequest schema is defined as a string with **`enum: ["GREEN", "YELLOW", "RED"]`**, implementing the **Goukassian Promise's Lantern artifact** as a machine-readable signal. The Lantern status provides a **coarse-grained indication of system compliance posture**: GREEN indicates normal operation with all pillars satisfied, YELLOW indicates elevated concern with one or more pillars showing non-critical violations, and RED indicates critical compliance failure requiring immediate attention. This trichotomous signaling aligns with the ternary logic core while providing **intuitive interpretation for human operators**. The Lantern status is included in escalation requests to **inform human reviewers of the broader system context** when evaluating Sacred Zero cases.

#### 4.2.2 Uncertainty Quantification

While the EscalationRequest schema does not explicitly define an `uncertainty_quantification` field, the `escalation_reason` field serves a similar function by capturing the rationale for the Sacred Pause. The full TSLF State 0 schema in `tml_schema.json` would define **structured uncertainty metrics**, but the OpenAPI specification's escalation endpoint uses a simplified representation to minimize request complexity. Implementations are expected to include uncertainty quantification data within the `escalation_reason` string or in the MoralTraceLog's justification evidence array. The specification acknowledges that **full uncertainty quantification may require additional schema evolution**, particularly as automated uncertainty estimation techniques mature.

#### 4.2.3 Deliberation Matrix

The **deliberation matrix**, which would capture the **multi-pillar evaluation that led to the Sacred Zero determination**, is not explicitly represented in the EscalationRequest schema. This omission reflects the specification's approach of capturing complex structured data in the JSON Schema bundle (`tml_schema.json`) while keeping the OpenAPI request/response schemas focused on endpoint contract essentials. The deliberation matrix would be included in the complete Moral Trace Log record, accessible through audit endpoints. A complete deliberation matrix would include **pairwise comparisons of pillar priorities, stakeholder impact assessments, and precedent case references** that guide human reviewers toward consistent decisions.

#### 4.2.4 Resolution Request

The `resolution` field in the EscalationResponse schema captures the **outcome of the human-in-the-loop review process**, serving as the resolution request mechanism. The `status` field's enum values (`PENDING`, `UNDER_REVIEW`, `RESOLVED`) track the escalation lifecycle, with `resolution` carrying the human reviewer's determination when status reaches `RESOLVED`. This field transforms the Sacred Pause from a **static state into an active workflow with accountable resolution procedures**. The resolution request typically includes **priority classification** (based on decision criticality and uncertainty severity), **required reviewer qualifications** (based on the domains of uncertainty identified), and **service level objectives for resolution time**.

### 4.3 TSLF State Variant: Refusal (State -1)

The **Refusal state variant** is represented through the `RefusalLog` and `RefusalConfirmation` schemas, capturing **hard refusals and license violations**.

#### 4.3.1 License Violation Recording

The `license_violation` field in the RefusalLog schema is defined as a **required string**, implementing the **Goukassian Promise's License artifact**. This field records the **specific license term or condition that was violated**, providing the legal and contractual basis for the refusal. The string type permits both structured license references (such as "GPL-3.0 Section 2" or "Custom License Clause 4.1") and human-readable descriptions. The **required status of this field ensures that all refusals are grounded in explicit license analysis**, preventing arbitrary refusals and enabling consistency analysis across refusal decisions.

#### 4.3.2 Threat Vector Analysis

The `threat_vector_analysis` field is defined as an **object**, providing **structured capture of the threat assessment** that led to the refusal. This field's open structure permits implementations to include diverse threat data, from malware signatures to behavioral anomalies to supply chain risk indicators. The inclusion of threat vector analysis in the refusal log supports **forensic investigation and pattern recognition** for future threat detection. Typical contents would include **threat actor identification, vulnerability exploitation paths, impact severity scores, and mitigation status**, following established frameworks such as STRIDE or MITRE ATT&CK where applicable.

#### 4.3.3 Chain of Custody

While the RefusalLog schema does not explicitly define a `chain_of_custody` field, the combination of `decision_id` (UUID), `license_violation` (string), and `threat_vector_analysis` (object) provides the **foundation for custody tracking**. The full TSLF State -1 schema would define **explicit chain of custody fields**, but the OpenAPI specification captures the essential refusal data for endpoint contract purposes. A complete chain of custody implementation would extend this with **custodian identity records, handoff timestamps, and integrity verification hashes** that document every touchpoint in the refusal log's lifecycle. This extension is particularly important for **forensic admissibility under rules such as FRE 902**, where automated chain of custody records can provide self-authenticating evidence status.

### 4.4 TSLF State Variant: Proceed (State +1)

The **Proceed state variant** is implicitly represented through the **StateEnvelope's conditional permission token requirement** and the PermissionToken schema, with detailed proceed logs captured in the MoralTraceLog container.

#### 4.4.1 Ethical Verification

**Ethical verification** for Proceed state is performed by the Anchoring Lane during `/anchoring/logs` processing, where the Moral Trace Log is evaluated against the **Eight Pillars and other constitutional constraints** before Permission Token issuance. This verification includes: confirmation that **no Sacred Zero conditions are present** (uncertainty below threshold), verification that **no Refuse conditions are triggered** (no license violations, no threat vectors exceeding tolerance), **positive confirmation of Human Rights Mandate compliance** (no UDHR/Geneva Convention conflicts), and **positive confirmation of Earth Protection Mandate compliance** (no Paris Agreement conflicts). This **multi-pillar verification ensures that Proceed decisions represent genuine ethical alignment** rather than merely the absence of ethical objections.

#### 4.4.2 The Signature Block

The **Signature Block** in the TML specification is represented through the **PermissionToken schema's `signer_key_id` field and the implicit cryptographic signature** that accompanies the token. The `signer_key_id` identifies the **HSM-protected key that signed the token**, serving as the **non-repudiation artifact** that prevents denial of authorization. The actual signature bytes are not included in the schema definition, as they are transport-dependent (typically conveyed in HTTP headers or JWT structures), but the `signer_key_id` provides the reference to verify the signature against. This design implements the **Goukassian Promise's Signature component**, which represents the **binding commitment of the governance system to its decision**.

#### 4.4.3 Audit Proof

The **audit proof** for Proceed state is provided by the **`log_hash` field in the PermissionToken schema**, which creates a **cryptographic commitment to the Moral Trace Log**. This hash enables auditors to verify that the Permission Token was issued for a **specific, unmodified log entry** by recomputing the hash and comparing it to the stored value. The audit proof is strengthened by the **Merkle tree anchoring** described in the `/audit/merkle-root` and `/audit/log-inclusion/{log_id}` endpoints, which provide **cryptographic proofs of log inclusion in a globally visible structure**. This three-layer audit architecture (log hash, Merkle root, inclusion proof) satisfies the requirements of **Pillar VIII (Public Blockchains)** and supports **regulatory verification without requiring access to implementation internals**.

## 5. Governance and Escalation Schemas

### 5.1 EscalationRequest Schema

The `EscalationRequest` schema initiates the **human-in-the-loop review process** that is central to the Sacred Zero operational workflow. With three fields, two of which are required, this schema balances the need for comprehensive context with the urgency of escalation initiation. The required `decision_id` field (UUID format) ensures that **every escalation is linked to a specific decision**, preventing orphaned escalation requests that lack audit context. The required `escalation_reason` field (string) mandates **documentation of why human review is necessary**, such as "Uncertainty in harm assessment: confidence interval [0.12, 0.34] spans threshold" or "Novel action type not covered by existing license terms". The optional `lantern_status` field (GREEN/YELLOW/RED enum) provides the reviewer with **immediate awareness of system-wide compliance state**, helping prioritize escalations when multiple Sacred Zero events occur simultaneously.

### 5.2 EscalationResponse Schema

The `EscalationResponse` schema provides the **system's acknowledgment and status tracking** for escalation requests. The schema has two required properties: `escalation_id` (UUID) and `status` (enum: PENDING/UNDER_REVIEW/RESOLVED), plus an optional `resolution` (string). The `escalation_id` provides a **unique identifier for tracking the escalation through its lifecycle**, distinct from the original `decision_id` to support multiple escalations per decision. The `status` enum captures the **three canonical phases of human review**: `PENDING` indicates the escalation has been queued but not yet assigned to a reviewer, `UNDER_REVIEW` indicates active human evaluation, and `RESOLVED` indicates a determination has been made. The `resolution` field carries the **human reviewer's decision**, which may include state transitions (proceeding to +1 or -1), additional information requests, or policy clarifications.

### 5.3 EscalationNotification Schema (Webhook Payload)

The `EscalationNotification` schema defines the payload for the **`sacredPause.escalation` webhook**, which provides **asynchronous notification when State 0 triggers human review**. The schema has four properties, three of which are required: `escalation_id` (UUID), `decision_id` (UUID), `status` (enum: ESCALATED/UNDER_REVIEW/RESOLVED), and optional `resolution` (string). This schema extends the EscalationResponse with an additional **`ESCALATED` status value for the initial notification**, providing clear signaling of the escalation event's onset. The webhook payload's structure enables **asynchronous notification of external systems** when Sacred Zero events require human attention, supporting integration with incident management systems, communication platforms, or higher-level governance dashboards. The webhook delivery semantics include **retry logic with exponential backoff**, as specified in the prompt's requirement for "retry semantics" on webhook definitions.

### 5.4 LanternStatus Schema

The `LanternStatus` schema defines the **public compliance beacon signal**, implementing the **Goukassian Promise's Lantern artifact** as an API-accessible resource.

#### 5.4.1 Public Beacon Signal Values (GREEN/YELLOW/RED)

The `status` field is defined as a string with **`enum: ["GREEN", "YELLOW", "RED"]`**, providing the **three-level compliance signal**. **GREEN** indicates that all Eight Pillars are satisfied and the system is operating within constitutional bounds. **YELLOW** indicates that one or more pillars show non-critical concerns or degraded status that warrant attention but do not prevent operation. **RED** indicates critical pillar failure or constitutional violation that requires immediate intervention. These values are defined as **UPPER_SNAKE_CASE strings**, consistent with the API naming conventions for enum values, despite being in a schema property context where camelCase might otherwise be expected. This exception reflects the Lantern status's role as a **public signal that may be displayed directly in user interfaces or monitoring systems**.

#### 5.4.2 Custodian Attribution and Timestamp

The `custodian_id` field (optional, string) identifies the **custodian node reporting the Lantern status**, supporting the **Hybrid Shield's distributed anchoring** by enabling per-custodian status visibility. The `timestamp` field (required, date-time) provides **temporal context for the status signal**, enabling consumers to detect stale data and implement appropriate freshness checks. The combination of custodian attribution and timestamp supports the **distributed governance model** by making visible the provenance and recency of compliance signals. The `lanternStatus.broadcast` webhook distributes these **attributed, timestamped status reports** to all registered subscribers, providing real-time transparency into the TML system's moral operational state.

## 6. Emergency Override Schemas

### 6.1 ShutdownRequest Schema

The `ShutdownRequest` schema enables **break-glass system shutdown under supreme authority**, as specified in **Monograph Section 13.3**. The schema has two required string properties: `reason` and `authority`. The `reason` field documents the **justification for the emergency shutdown**, providing essential context for post-incident analysis and regulatory reporting. The `authority` field identifies the **entity invoking supreme authority**, typically including cryptographic identification that can be verified against the CA-VettedJWT used for authentication. The schema's **minimal structure reflects the urgency of emergency situations**: by requiring only two fields, the specification enables rapid shutdown initiation while still capturing essential audit data. This schema implements the **emergency override capability** specified in Section 5A, with the endpoint (`/emergency/shutdown`) classified as **FUTURE** due to implementation constraints from Section 10.2.

### 6.2 ShutdownConfirmation Schema

The `ShutdownConfirmation` schema provides **system acknowledgment of shutdown initiation** and tracks execution progress. The schema contains two required fields: `shutdown_id` (UUID) and `status` (enum: INITIATED/IN_PROGRESS/COMPLETED). The `shutdown_id` provides **unique tracking for the shutdown event**, while the `status` enumeration captures the **progressive nature of system shutdown**: `INITIATED` indicates the request has been accepted, `IN_PROGRESS` indicates active shutdown procedures are executing, and `COMPLETED` indicates all system components have reached a safe state. The three-phase status acknowledges that **shutdown of a distributed TML system may take time**, particularly when in-flight decisions must be properly logged and anchored before termination. The progressive status reporting enables **oversight entities to monitor shutdown completion** and intervene if the process stalls.

### 6.3 KillSwitchRequest Schema

The `KillSwitchRequest` schema provides **immediate execution stop without the graceful shutdown sequence**. The schema has two required fields: `activation_code` (string) and `expiry` (date-time). The `activation_code` field implements a **cryptographic challenge-response mechanism** that prevents accidental or malicious activation. The `expiry` field limits the **temporal validity of the kill switch authorization**, preventing indefinite system disablement and supporting automatic recovery procedures. This schema supports the **most aggressive emergency response**, prioritizing speed over data integrity by terminating execution without completing in-flight operations. The time-bounded design reflects the **kill switch's purpose as a temporary emergency measure** rather than a permanent termination; it stops execution immediately but expects subsequent evaluation to determine whether full shutdown or restoration is appropriate.

### 6.4 KillSwitchConfirmation Schema

The `KillSwitchConfirmation` schema confirms **activation and documents deauthorization conditions**. The schema contains two optional fields: `active` (boolean) and `deactivation_time` (date-time). The `active` field indicates whether the kill switch is currently engaged, providing **immediate confirmation of the requested state change**. The optional `deactivation_time` field indicates when the kill switch will **automatically disengage** if configured with temporal limits, enabling operators to plan for system restoration. Unlike shutdown, which progresses through a sequence, kill switch maintains a **binary active/inactive state** that can be toggled rapidly in response to evolving threat conditions. The optional nature of these fields reflects the potential for **asynchronous kill switch operation**: the immediate response may confirm activation without knowing the final deactivation time, which would be updated in subsequent queries.

## 7. Refusal and Redress Schemas

### 7.1 RefusalLog Schema

The `RefusalLog` schema documents **State -1 (Refuse) determinations**, with fields: `decision_id` (UUID, required), `license_violation` (string, required), and `threat_vector_analysis` (object, optional). This schema ensures that **every refusal is permanently recorded with explicit license violation documentation**, supporting audit requirements and pattern analysis for license compliance improvement. The `license_violation` field's required status ensures that **all refusals are grounded in a specific governance rule**, preventing arbitrary negative determinations and enabling consistency analysis across refusal decisions. The schema **directly implements the Goukassian Promise pillar** by documenting license violations that may trigger Lantern signal changes or signature revocation.

### 7.2 RefusalConfirmation Schema

The `RefusalConfirmation` schema confirms **refusal logging**, with required fields: `logged_id` (UUID) and `timestamp` (date-time). The `logged_id` provides the **persistent identifier for the refusal record**, enabling subsequent retrieval and verification. The `timestamp` records when the refusal was logged, **establishing the temporal anchor for the refusal record's inclusion in the Merkle tree**. This confirmation schema ensures that **refusal logging is synchronous and verifiable**, preventing race conditions where multiple requests might receive inconsistent refusal responses.

### 7.3 Challenge Schema (Subject-Initiated)

The `Challenge` schema enables **affected subjects to contest TML decisions**, with required fields: `subject_id` (string), `decision_id` (UUID), and `reason` (string). This schema implements the **Human Rights Mandate pillar (Pillar V)** by providing a **mechanism for individual redress** that is accessible to decision subjects rather than limited to system operators. The `subject_id` field identifies the challenging party, the `decision_id` links to the specific decision being challenged, and the `reason` field captures the **challenger's basis for dispute**, which may include: factual errors in decision inputs, misapplication of ethical frameworks, procedural violations in the governance process, or new evidence not available at decision time. The schema's design **encourages legitimate challenges while preventing spam or frivolous filings** through the required justification field.

### 7.4 ChallengeConfirmation Schema

The `ChallengeConfirmation` schema confirms **challenge acceptance and tracks resolution**, with fields: `challenge_id` (UUID, required), `status` (enum: RECEIVED/UNDER_REVIEW/RESOLVED, required), and `resolution` (optional, string). The `challenge_id` provides **unique tracking of the challenge through the review workflow**. The status enumeration reflects the **typical administrative justice lifecycle**: `RECEIVED` indicates successful submission, `UNDER_REVIEW` indicates active re-evaluation of the original decision, and `RESOLVED` indicates final disposition with narrative explanation. The optional `resolution` field captures the **outcome rationale**, creating precedent that can guide future challenge handling and improve automated decision quality. This structure **parallels the EscalationResponse schema**, reflecting the similar workflow patterns between Sacred Pause escalation and subject-initiated redress.

## 8. Auditor Verification Schemas

### 8.1 MerkleRoot Schema

The `MerkleRoot` schema provides the **cryptographic anchor for batch log verification**, with required fields: `root_hash` (sha256) and `timestamp` (date-time). This schema implements the **Public Blockchains pillar (Pillar VIII)** by providing the **Merkle root that summarizes all logs in a batch**, enabling efficient verification of log inclusion without revealing individual log contents. The SHA-256 format ensures compatibility with standard cryptographic tooling. The Merkle root serves as the **entry point for inclusion proofs**, allowing auditors to verify specific log entries without downloading the entire log dataset. The `timestamp` records when the Merkle tree was constructed or anchored, **establishing the temporal scope of the verification**.

### 8.2 InclusionProof Schema

The `InclusionProof` schema provides **cryptographic proof that a specific log entry is included in the Merkle tree**, with required fields: `log_id` (UUID), `proof` (array of SHA-256 strings), and `verified` (boolean). The `proof` array contains the **sequence of sibling hashes** that, when combined with the log entry's hash, reproduce the Merkle root. This structure enables **efficient verification (O(log n) in tree height)** without revealing other log entries' contents. The `verified` field indicates whether the proof has been validated against the current Merkle root, providing **immediate feedback while not precluding independent verification**. This schema is **critical for the "No Log = No Action" audit function**, as it enables verification that every Proceed decision was properly logged before actuation authorization.

### 8.3 QualifiedTimestamp Schema

The `QualifiedTimestamp` schema provides **cryptographically secure timestamps for log entries**, with required fields: `log_id` (UUID), `timestamp` (date-time), and `signer` (string). This schema supports **regulatory requirements for qualified electronic timestamps** under frameworks such as eIDAS, where timestamp authority signature provides **legal presumption of accuracy**. The `signer` field identifies the **timestamp authority or custodian** that issued the qualified timestamp, supporting **multi-source timestamp verification for high-assurance scenarios**. The linkage to `log_id` ensures that timestamps are **bound to specific moral traces** rather than issued generically, preventing timestamp replay or misassociation attacks.

## 9. Regulator Inspection Schemas

### 9.1 CustodianQuorum Schema

The `CustodianQuorum` schema reports the **distributed consensus status of the Hybrid Shield's six custodians**, with required fields: `custodians` (array of objects) and `quorum_achieved` (boolean). This schema enables regulators to **verify that distributed anchoring maintains sufficient geographic and jurisdictional diversity** to resist single-point compromise.

#### 9.1.1 Cross-Jurisdiction Custodian Array

The `custodians` array contains objects with `id` (string), `status` (string), and `jurisdiction` (string) fields, representing the current state of each custodian node in the Hybrid Shield. The `id` field provides **unique custodian identification for individual accountability and key mapping**. The `status` field reports the custodian's current operational state, with expected values including **"ONLINE", "DEGRADED", "OFFLINE", and "SYNCING"**. The `jurisdiction` field documents the **legal jurisdiction governing each custodian**, supporting regulatory analysis of cross-border data handling and enabling **jurisdiction-specific compliance verification**. The array structure accommodates variable custodian counts, allowing the Hybrid Shield to scale from minimum viable configurations to production deployments with **six or more custodians**.

#### 9.1.2 Quorum Achieved Boolean

The `quorum_achieved` boolean provides **immediate indication of whether sufficient custodians are active** to maintain distributed anchoring integrity. Quorum definitions are deployment-specific but typically require **majority or supermajority of custodians to be ACTIVE**, with degradation policies that **trigger alerts or automatic protective measures when quorum is at risk**. This boolean enables **automated monitoring and alerting systems** to respond to custodian failures without requiring complex array parsing, while the detailed custodian array supports **root cause analysis and recovery planning**.

## 10. Gateway Schemas

### 10.1 GatewayRequest Schema

The `GatewayRequest` schema defines the **input for TML Gateway routing decisions**, with required fields: `request_type` (string) and `payload` (object). This schema implements the **Gateway endpoint by capturing the request classification and content needed for lane assignment**. The `request_type` field enables the gateway to **apply appropriate routing rules and security policies** based on request category, while `payload` carries the actual request data to be forwarded to the assigned lane. The flexible structure accommodates diverse request types without constraining the gateway's evolution.

### 10.2 GatewayResponse Schema

The `GatewayResponse` schema defines the **output from the gateway routing system**, with required fields: `lane_assigned` (enum INFERENCE/ANCHORING) and `routing_id` (UUID).

#### 10.2.1 Lane Assignment Enumeration (INFERENCE/ANCHORING)

The `lane_assigned` field's enumeration values **`INFERENCE` and `ANCHORING`** are defined in UPPER_SNAKE_CASE, consistent with the API naming conventions for enum values. These values directly correspond to the **Dual-Lane Latency Architecture's Lane 1 (Inference, <2ms) and Lane 2 (Anchoring, <500ms)**, providing clear routing direction to the client. This binary enumeration reflects the **architectural dichotomy**: there is no "both" or "neither" lane assignment.

### 10.3 GatewayStatus Schema

The `GatewayStatus` schema defines the **operational status of the TML Gateway**, with required fields: `status` (enum HEALTHY/DEGRADED/DOWN) and `version` (string), plus optional `last_anchored` (date-time).

#### 10.3.1 Operational Status Values (HEALTHY/DEGRADED/DOWN)

The `status` enumeration implements the **fail-closed design principle**: **`HEALTHY`** indicates normal operation with both lanes functional, **`DEGRADED`** indicates reduced capacity (such as one lane experiencing elevated latency) but continued operation, and **`DOWN`** indicates critical failure where the gateway cannot safely process requests. The fail-closed behavior requires that the gateway **reject or queue requests when in `DOWN` state** rather than routing them to potentially compromised lanes. These values support **automated health checking and load balancing decisions** by external load balancers.

#### 10.3.2 Last Anchored Timestamp

The `last_anchored` field records when the **most recent successful Merkle root anchoring occurred**, providing visibility into the **freshness of the blockchain commitment chain**. This field is particularly important for **auditor and regulator clients** who must verify that anchoring maintains expected cadence, with significant delays potentially indicating operational issues or security incidents. The timestamp enables **automated alerting on anchoring staleness** and supports regulatory reporting on anchoring reliability.

## 11. Endpoint Definitions: Inference Lane

### 11.1 POST /decisions

#### 11.1.1 Purpose: Submit Decision Vector, Receive Proposed State

The `/decisions` endpoint is the **primary interface of the Inference Lane**, implementing the **binary logic's role in the Dual-Lane Architecture**. Clients submit a `DecisionVector` containing the action to be evaluated and optional context, and receive a `StateEnvelope` containing the **proposed triadic state**. This endpoint embodies the principle that **the binary system proposes actions**: it performs pattern recognition and statistical analysis to suggest whether the action should proceed, pause, or be refused, but this suggestion is **not itself executable**. The endpoint's response with a State Envelope rather than an actuation command ensures that **all proposed +1 states must still pass through the Anchoring Lane for Permission Token issuance** before any physical action can occur.

#### 11.1.2 Security: mTLS + ServiceAccountJWT

The endpoint requires both **`mTLS` and `ServiceAccountJWT` security schemes**, implementing the Inference Lane's **defense-in-depth authentication model**. The mTLS layer authenticates the network endpoint, while the ServiceAccountJWT layer authenticates the application principal, ensuring that **compromised network access alone cannot submit decision vectors**.

#### 11.1.3 Pillar Annotation: SacredZero

The **`x-tml-pillar: SacredZero`** annotation associates this endpoint with **Pillar I (Sacred Zero)**, reflecting that the Inference Lane's state determination is the **trigger for Sacred Zero evaluation when uncertainty is detected**. While the endpoint handles all three states, its association with Sacred Zero emphasizes the **governance importance of correctly identifying when truth is uncertain**.

#### 11.1.4 Implementation Status: SHIPPING

The **`x-tml-implementation-status: SHIPPING`** annotation indicates that this endpoint is **buildable with 2025 production libraries and infrastructure**, with no known blockers from Section 10 of the monograph. This status reflects the **maturity of binary inference technology** and the well-understood nature of REST API implementations.

## 12. Endpoint Definitions: Anchoring Lane

### 12.1 POST /anchoring/logs

#### 12.1.1 Purpose: Submit Moral Trace Log, Receive Permission Token

The `/anchoring/logs` endpoint is the **primary interface of the Anchoring Lane**, implementing the **ternary logic's role as sovereign governance coprocessor**. Clients submit a `MoralTraceLog` containing the complete decision record, and receive a `PermissionToken` that **cryptographically authorizes actuation for +1 state decisions**. This endpoint embodies the principle that **the ternary system dictates execution**: it verifies compliance with all Eight Pillars, logs the decision for forensic purposes, and issues the Permission Token that the actuation layer requires. The endpoint's issuance of Permission Tokens is the **concrete implementation of "No Log = No Action"**: without this token, even a +1 proposal from the Inference Lane cannot result in physical execution.

#### 12.1.2 Security: HSM-SignedJWT + MutualTLS

The endpoint requires both **`HSM_SignedJWT` and `MutualTLS` security schemes**, implementing the Anchoring Lane's **elevated security requirements**. The HSM-signed JWT ensures that authentication tokens are protected by **hardware security modules**, while mutual TLS provides **transport-layer authentication**.

#### 12.1.3 Pillar Annotation: GoukassianPromise

The **`x-tml-pillar: GoukassianPromise`** annotation associates this endpoint with **Pillar III (Goukassian Promise)**, reflecting that the Permission Token issuance implements the **Promise's artifacts of Lantern, Signature, and License**.

#### 12.1.4 Implementation Status: BETA

The **`x-tml-implementation-status: BETA`** annotation indicates that this endpoint is **buildable with documented tradeoffs**, with latency, cost, or throughput penalties acceptable for regulated deployments. This status reflects the **complexity of HSM integration** and the performance challenges of comprehensive pillar verification.

